<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTC ETF Flow Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:16px}
h1{font-size:18px;margin:0 0 4px}
.sub{color:#8b949e;font-size:12px;margin-bottom:12px}
.banner{background:#da3633;color:#fff;padding:10px 14px;border-radius:8px;font-weight:600;margin-bottom:12px;display:none}
.cards{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 14px;min-width:100px}
.card .k{font-size:11px;color:#8b949e}
.card .v{font-size:20px;font-weight:700;margin-top:2px}
.pos{color:#3fb950}.neg{color:#f85149}
.chartbox{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px;margin-bottom:14px}
canvas{max-height:340px}
.note{color:#8b949e;font-size:11px}
</style>
</head>
<body>
<h1>BTC Spot ETF Daily Net Flows</h1>
<div class="sub" id="meta">loading…</div>
<div class="banner" id="staleBanner"></div>
<div class="cards">
  <div class="card"><div class="k">Latest flow</div><div class="v" id="latest">–</div></div>
  <div class="card"><div class="k">Streak</div><div class="v" id="streak">–</div></div>
  <div class="card"><div class="k">Z-score (90d)</div><div class="v" id="z">–</div></div>
  <div class="card"><div class="k">IBIT latest</div><div class="v" id="ibit">–</div></div>
</div>
<div class="chartbox"><canvas id="flowChart"></canvas></div>
<div class="chartbox"><canvas id="cumChart"></canvas></div>
<p class="note">Source: farside.co.uk · US$ millions · bands = rolling 90d ±2σ (fat-tailed: read as relative extremeness, not probability) · manual-patch rows excluded from none</p>
<script>
const ROLL=90;
fetch('data/flows.json?'+Date.now()).then(r=>r.json()).then(j=>{
  const m=j.meta||{};
  document.getElementById('meta').textContent=
    'last fetch: '+(m.last_fetch_utc||'?')+' · status: '+(m.status||'?');
  if(m.status!=='ok'){
    const b=document.getElementById('staleBanner');
    b.style.display='block';
    b.textContent='STALE DATA — '+(m.stale_reason||'')+' (since '+(m.stale_since||'?')+') — do not trade on this. Check farside.co.uk directly.';
  }
  const days=j.days||[];
  if(!days.length)return;
  const labels=days.map(d=>d.date);
  const vals=days.map(d=>d.total_musd);

  // rolling mean & sigma per point
  const mu=[],up=[],lo=[];
  for(let i=0;i<vals.length;i++){
    const w=vals.slice(Math.max(0,i-ROLL+1),i+1);
    const mean=w.reduce((a,b)=>a+b,0)/w.length;
    const sd=w.length>1?Math.sqrt(w.reduce((a,b)=>a+(b-mean)**2,0)/w.length):0;
    mu.push(mean);up.push(mean+2*sd);lo.push(mean-2*sd);
  }
  // cumulative
  let s=0;const cum=vals.map(v=>+(s+=v).toFixed(1));

  const c=j.computed||{};
  const last=days[days.length-1];
  const el=(id,txt,cls)=>{const e=document.getElementById(id);e.textContent=txt;if(cls)e.className='v '+cls;};
  el('latest',(last.total_musd>0?'+':'')+last.total_musd+'M',last.total_musd>=0?'pos':'neg');
  const st=c.streak||{};
  el('streak',(st.direction==='inflow'?'▲ ':'▼ ')+(st.days||0)+'d '+(st.direction||''),st.direction==='inflow'?'pos':'neg');
  el('z',(c.latest_z>0?'+':'')+(c.latest_z??'–')+(c.insufficient_window?' ⚠︎':''),c.latest_z>=0?'pos':'neg');
  const ib=(last.funds||{}).IBIT;
  el('ibit',ib===undefined?'n/a':((ib>0?'+':'')+ib+'M'),ib>=0?'pos':'neg');

  new Chart(document.getElementById('flowChart'),{
    data:{labels,datasets:[
      {type:'bar',label:'Daily net flow ($M)',data:vals,
       backgroundColor:vals.map(v=>v>=0?'rgba(63,185,80,.75)':'rgba(248,81,73,.75)')},
      {type:'line',label:'+2σ',data:up,borderColor:'rgba(139,148,158,.8)',borderWidth:1,borderDash:[5,4],pointRadius:0},
      {type:'line',label:'mean (90d)',data:mu,borderColor:'rgba(139,148,158,.5)',borderWidth:1,pointRadius:0},
      {type:'line',label:'-2σ',data:lo,borderColor:'rgba(139,148,158,.8)',borderWidth:1,borderDash:[5,4],pointRadius:0}
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8b949e',boxWidth:12,font:{size:10}}}},
      scales:{x:{ticks:{color:'#8b949e',maxTicksLimit:8}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}}}
  });
  new Chart(document.getElementById('cumChart'),{
    type:'line',
    data:{labels,datasets:[{label:'Cumulative net flow ($M)',data:cum,
      borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,.15)',fill:true,pointRadius:0,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},
      scales:{x:{ticks:{color:'#8b949e',maxTicksLimit:8}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}}}
  });
}).catch(e=>{
  const b=document.getElementById('staleBanner');
  b.style.display='block';b.textContent='Cannot load data/flows.json — '+e;
});
</script>
</body>
</html>
